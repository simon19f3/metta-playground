<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MeTTa Playground</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f7f7fb;
      color: #222;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .toolbar label {
      font-size: 14px;
      color: #4b5563;
    }

    select, button {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: white;
      font-size: 14px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    #editor {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      overflow: hidden;
      background: white;
      min-height: 280px;
    }

    #output {
      margin-top: 16px;
      padding: 12px;
      min-height: 80px;
      white-space: pre-wrap;
      background: #111827;
      color: #e5e7eb;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
  </style>
</head>
<body>
  <h1>MeTTa Wasm Playground</h1>
  <p>Syntax highlighting, context-aware suggestions, parse-aware completions, and theme switching.</p>

  <div class="toolbar">
    <div>
      <label for="themeSelect">Theme</label>
      <select id="themeSelect">
        <option value="dark" selected>Dark</option>
        <option value="light">Light</option>
      </select>
    </div>
    <button id="runBtn">Run MeTTa</button>
  </div>

  <div id="editor"></div>

  <h3>Output</h3>
  <div id="output">Loading wasm...</div>

  <script type="module" src="/src/editor.js"></script>
</body>
</html>
