<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MeTTa Playground</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 960px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f7f7fb;
      color: #222;
    }

    #editor {
      border: 1px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
      background: white;
    }

    .cm-editor {
      min-height: 240px;
      font-size: 14px;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    #output {
      margin-top: 16px;
      padding: 12px;
      min-height: 80px;
      white-space: pre-wrap;
      background: #111827;
      color: #e5e7eb;
      border-radius: 8px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>MeTTa Wasm Playground</h1>
  <p>Write MeTTa code and get suggestions.</p>

  <div id="editor"></div>
  <button id="runBtn">Run MeTTa</button>

  <h3>Output</h3>
  <div id="output">Loading wasm...</div>

  <script type="module" src="/src/editor.js"></script>
</body>
</html>
